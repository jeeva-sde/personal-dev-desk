
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f5f2;--white:#ffffff;--surface:#f0eee9;--surface2:#e8e5df;
  --red:#e8382a;--red-light:#fef2f1;--red-mid:#fcd5d2;
  --text:#1a1814;--text2:#6b6760;--text3:#b0ada8;
  --border:#e2dfd9;--border2:#d0cdc7;
  --green:#2e9e5b;--amber:#d97706;--blue:#2563eb;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
.app{max-width:820px;margin:0 auto;padding:16px 20px}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding:0 2px}
.logo{font-size:13px;font-weight:600;color:var(--red);letter-spacing:0.5px;display:flex;align-items:center;gap:6px}
.logo-dot{width:7px;height:7px;background:var(--red);border-radius:50%}
.nav{display:flex;gap:4px;background:var(--white);border:1px solid var(--border);border-radius:40px;padding:4px}
.nb{background:none;border:none;padding:7px 16px;border-radius:30px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;color:var(--text2);transition:all 0.18s}
.nb.active{background:var(--red);color:#fff;font-weight:600}
.nb:hover:not(.active){background:var(--surface);color:var(--text)}

.panel{display:none}.panel.active{display:block}

.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:20px}
.card-sm{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px}

/* CLOCK */
.clock-main{text-align:center;padding:24px 16px 16px}
.clock-hm{font-family:'DM Mono',monospace;font-size:clamp(64px,13vw,96px);font-weight:500;color:var(--text);line-height:1;letter-spacing:-2px}
.clock-s{font-family:'DM Mono',monospace;font-size:clamp(32px,6vw,48px);color:var(--red);font-weight:400}
.clock-date{font-size:13px;color:var(--text2);margin:10px 0 20px;letter-spacing:0.3px}
.info-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.info-chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 18px;text-align:center;min-width:100px}
.chip-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px}
.chip-val{font-family:'DM Mono',monospace;font-size:18px;color:var(--text);font-weight:500}
.progress-track{background:var(--surface2);height:3px;border-radius:4px;max-width:360px;margin:0 auto;overflow:hidden}
.progress-fill{height:100%;background:var(--red);border-radius:4px;transition:width 1s linear}
.progress-label{text-align:center;font-size:11px;color:var(--text3);margin-top:5px}

/* STOPWATCH */
.sw-time{font-family:'DM Mono',monospace;font-size:clamp(52px,10vw,80px);font-weight:500;text-align:center;color:var(--text);line-height:1;margin:16px 0 4px;letter-spacing:-1px}
.sw-ms{font-family:'DM Mono',monospace;font-size:clamp(22px,4vw,32px);color:var(--red);text-align:center;margin-bottom:20px}
.btn-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.btn{padding:11px 26px;border-radius:30px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;transition:all 0.18s;letter-spacing:0.2px}
.btn:active{transform:scale(0.97)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#cc2a1e}
.btn-outline{background:var(--white);color:var(--text2);border:1px solid var(--border2)}.btn-outline:hover{background:var(--surface);color:var(--text);border-color:var(--text3)}
.btn-green{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}.btn-green:hover{background:#bbf7d0}
.btn-amber-l{background:#fef9c3;color:#854d0e;border:1px solid #fde68a}.btn-amber-l:hover{background:#fde68a}
.laps{max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.lap-row{display:flex;justify-content:space-between;padding:9px 14px;font-size:12px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;color:var(--text2)}
.lap-row:last-child{border-bottom:none}
.lap-row:first-child{color:var(--red);font-weight:500;background:var(--red-light)}
.lap-row:nth-child(even){background:var(--surface)}

/* TIMER */
.preset-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.preset{padding:8px 18px;background:var(--surface);border:1px solid var(--border2);border-radius:30px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.18s}
.preset:hover,.preset.sel{background:var(--red);border-color:var(--red);color:#fff}
.timer-ring-wrap{position:relative;width:180px;height:180px;margin:0 auto 18px}
.timer-ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-time{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:var(--text)}
.ring-sub{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px}
.custom-row{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:16px}
.t-input{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:10px;font-family:'DM Mono',monospace;font-size:20px;width:66px;text-align:center;outline:none;font-weight:500}
.t-input:focus{border-color:var(--red)}
.t-sep{color:var(--text3);font-size:20px;font-family:'DM Mono',monospace}

/* ALARM */
.alarm-form{margin-bottom:18px}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;display:block}
.time-input-big{font-family:'DM Mono',monospace;font-size:40px;font-weight:500;color:var(--text);background:transparent;border:none;outline:none;width:100%;text-align:center;padding:8px 0;cursor:pointer;border-bottom:2px solid var(--border2);margin-bottom:14px;transition:border-color 0.2s}
.time-input-big:focus{border-bottom-color:var(--red)}
.label-input{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:10px;width:100%;font-family:'Outfit',sans-serif;font-size:13px;outline:none;margin-bottom:12px}
.label-input:focus{border-color:var(--red)}
.alarms{display:flex;flex-direction:column;gap:10px}
.alarm-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;transition:all 0.2s}
.alarm-card.on{border-color:var(--red-mid)}
.alarm-card.firing{border-color:var(--red);background:var(--red-light);animation:pulse 0.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.alarm-time{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--text)}
.alarm-lbl{font-size:12px;color:var(--text2);margin-top:2px}
.tog{padding:5px 14px;border-radius:20px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text2);transition:all 0.18s}
.tog.on{background:var(--red);border-color:var(--red);color:#fff}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px 8px;transition:color 0.18s}
.del-btn:hover{color:var(--red)}
.no-alarms{text-align:center;color:var(--text3);padding:24px;font-size:13px}

/* SETTINGS */
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.setting-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px}
.swatch-row{display:flex;gap:8px;flex-wrap:wrap}
.sw{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.18s}
.sw.active,.sw:hover{border-color:var(--text);transform:scale(1.1)}
.wp-btn{display:block;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:9px 14px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;width:100%;text-align:left;margin-bottom:7px;transition:all 0.18s}
.wp-btn:hover{color:var(--text);border-color:var(--text3);background:var(--surface2)}
.sel-input{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:10px;width:100%;font-family:'Outfit',sans-serif;font-size:13px;outline:none;cursor:pointer;margin-bottom:8px}
.sel-input:focus{border-color:var(--red)}
.notif{position:absolute;top:0;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:10px 22px;border-radius:0 0 14px 14px;font-size:13px;font-weight:600;z-index:99;display:none;white-space:nowrap}
.full-fab{position:absolute;bottom:16px;right:16px;background:var(--white);border:1px solid var(--border2);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;transition:all 0.18s;z-index:50}
.full-fab:hover{color:var(--red);border-color:var(--red)}
#wpFile{display:none}
.divider{height:1px;background:var(--border);margin:14px 0}
</style>

<div style="position:relative;min-height:600px">
<div class="notif" id="notif"></div>
<div class="app">
  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>Flower Clock..❤️⏰</div>
    <div class="nav">
      <button class="nb active" onclick="sw('clock',0)">Clock</button>
      <button class="nb" onclick="sw('stopwatch',1)">Stopwatch</button>
      <button class="nb" onclick="sw('timer',2)">Timer</button>
      <button class="nb" onclick="sw('alarm',3)">Alarm</button>
      <button class="nb" onclick="sw('settings',4)">Settings</button>
    </div>
  </div>

  <div class="panel active" id="p-clock">
    <div class="card clock-main">
      <div><span class="clock-hm" id="cHM">10:45</span><span class="clock-s" id="cS">:22</span></div>
      <div class="clock-date" id="cDate">Thursday, 14 May 2026</div>
      <div class="info-row">
        <div class="info-chip"><div class="chip-label">Week</div><div class="chip-val" id="wk">20</div></div>
        <div class="info-chip"><div class="chip-label">Day #</div><div class="chip-val" id="doy">134</div></div>
        <div class="info-chip"><div class="chip-label">Timezone</div><div class="chip-val" style="font-size:14px;padding-top:2px" id="tz">IST</div></div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="dpFill" style="width:45%"></div></div>
      <div class="progress-label" id="dpLabel">Day 45% elapsed</div>
    </div>
  </div>

  <div class="panel" id="p-stopwatch">
    <div class="card" style="text-align:center">
      <div class="sw-time" id="swT">00:00</div>
      <div class="sw-ms" id="swMs">.000</div>
      <div class="btn-row">
        <button class="btn btn-red" id="swBtn" onclick="swToggle()">Start</button>
        <button class="btn btn-outline" id="swLap" onclick="swLap()" disabled>Lap</button>
        <button class="btn btn-outline" onclick="swReset()">Reset</button>
      </div>
      <div class="laps" id="lapList" style="display:none"></div>
    </div>
  </div>

  <div class="panel" id="p-timer">
    <div class="card" style="text-align:center">
      <div class="preset-row">
        <button class="preset" onclick="setTimer(5,this)">5 min</button>
        <button class="preset" onclick="setTimer(25,this)">Pomodoro 25</button>
        <button class="preset" onclick="setTimer(30,this)">30 min</button>
        <button class="preset" onclick="setTimer(45,this)">45 min</button>
        <button class="preset" onclick="setTimer(60,this)">1 hour</button>
      </div>
      <div class="timer-ring-wrap">
        <svg viewBox="0 0 180 180" width="180" height="180">
          <circle cx="90" cy="90" r="78" fill="none" stroke="#f0eee9" stroke-width="8"/>
          <circle cx="90" cy="90" r="78" fill="none" stroke="#e8382a" stroke-width="8" stroke-linecap="round" stroke-dasharray="490" stroke-dashoffset="490" id="tRing"/>
        </svg>
        <div class="ring-center">
          <div class="ring-time" id="tDisp">00:00</div>
          <div class="ring-sub" id="tLbl">set timer</div>
        </div>
      </div>
      <div class="custom-row">
        <input class="t-input" type="number" id="cMin" placeholder="mm" min="0" max="99" oninput="onCust()">
        <span class="t-sep">:</span>
        <input class="t-input" type="number" id="cSec" placeholder="ss" min="0" max="59" oninput="onCust()">
      </div>
      <div class="btn-row">
        <button class="btn btn-red" id="tBtn" onclick="tToggle()">Start</button>
        <button class="btn btn-outline" onclick="tReset()">Reset</button>
      </div>
    </div>
  </div>

  <div class="panel" id="p-alarm">
    <div class="card alarm-form">
      <div class="setting-label">Set new alarm</div>
      <input type="time" class="time-input-big" id="alTime" value="07:00">
      <input type="text" class="label-input" id="alLbl" placeholder="Label — e.g. Wake up, Stand-up meeting...">
      <button class="btn btn-red" onclick="addAlarm()" style="width:100%">Add alarm</button>
    </div>
    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin:4px 0 10px 2px">Active alarms</div>
    <div class="alarms" id="alList"><div class="no-alarms">No alarms set yet.</div></div>
  </div>

  <div class="panel" id="p-settings">
    <div class="settings-grid">
      <div class="card-sm">
        <div class="setting-label">Accent color</div>
        <div class="swatch-row">
          <div class="sw active" style="background:#e8382a" onclick="setAccent('#e8382a','#ff6b6b',this)"></div>
          <div class="sw" style="background:#2563eb" onclick="setAccent('#2563eb','#3b82f6',this)"></div>
          <div class="sw" style="background:#7c3aed" onclick="setAccent('#7c3aed','#a78bfa',this)"></div>
          <div class="sw" style="background:#059669" onclick="setAccent('#059669','#10b981',this)"></div>
          <div class="sw" style="background:#d97706" onclick="setAccent('#d97706','#fbbf24',this)"></div>
          <div class="sw" style="background:#db2777" onclick="setAccent('#db2777','#f472b6',this)"></div>
        </div>
      </div>
      <div class="card-sm">
        <div class="setting-label">Wallpaper</div>
        <label class="wp-btn" for="wpFile">Upload image</label>
        <input type="file" id="wpFile" accept="image/*" onchange="setWp(event)">
        <button class="wp-btn" onclick="clearWp()">Clear wallpaper</button>
        <div style="font-size:11px;color:var(--text3);margin-bottom:5px">Opacity</div>
        <input type="range" min="0" max="35" value="12" step="1" id="wpOp" oninput="setWpOp(this.value)" style="width:100%">
      </div>
      <div class="card-sm">
        <div class="setting-label">Alarm sound</div>
        <select class="sel-input" id="sndSel">
          <option value="beep">Classic beep</option>
          <option value="chime">Soft chime</option>
          <option value="pulse">Pulse beat</option>
          <option value="ring">Double ring</option>
        </select>
        <button class="btn btn-outline" onclick="testSnd()" style="width:100%;font-size:12px">Play test sound</button>
      </div>
      <div class="card-sm">
        <div class="setting-label">App theme</div>
        <button class="wp-btn" onclick="applyTheme('light')">Light (default)</button>
        <button class="wp-btn" onclick="applyTheme('warm')">Warm cream</button>
        <button class="wp-btn" onclick="applyTheme('cool')">Cool white</button>
        <button class="wp-btn" onclick="applyTheme('dark')">Dark mode</button>
      </div>
    </div>
  </div>
</div>
<button class="full-fab" onclick="toggleFs()" title="Fullscreen">&#x26F6;</button>
<div id="wpLayer" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:-1;background-size:cover;background-position:center;pointer-events:none;opacity:0.12;border-radius:16px"></div>
</div>

<script>
var aC=null;
function gAC(){if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();return aC}
function playS(t){
  try{var c=gAC();
    if(t==='beep'){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(0.35,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);o.start();o.stop(c.currentTime+0.4);}
    else if(t==='chime'){[523,659,784,1047].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0,c.currentTime+i*0.15);g.gain.linearRampToValueAtTime(0.3,c.currentTime+i*0.15+0.05);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.15+0.6);o.start(c.currentTime+i*0.15);o.stop(c.currentTime+i*0.15+0.6);});}
    else if(t==='pulse'){for(var i=0;i<4;i++){(function(ii){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=440;o.type='square';g.gain.setValueAtTime(0,c.currentTime+ii*0.22);g.gain.linearRampToValueAtTime(0.15,c.currentTime+ii*0.22+0.04);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+ii*0.22+0.18);o.start(c.currentTime+ii*0.22);o.stop(c.currentTime+ii*0.22+0.2);})(i);}}
    else{[660,880].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0.25,c.currentTime+i*0.2);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.2+0.45);o.start(c.currentTime+i*0.2);o.stop(c.currentTime+i*0.2+0.5);});}
  }catch(e){}
}
function testSnd(){playS(document.getElementById('sndSel').value)}

function sw(name,idx){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('p-'+name).classList.add('active');
  document.querySelectorAll('.nb').forEach(function(b,i){b.classList.toggle('active',i===idx)});
}

function updateClock(){
  var n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
  var hh=h%12||12;
  document.getElementById('cHM').textContent=(hh<10?'0':'')+hh+':'+(m<10?'0':'')+m;
  document.getElementById('cS').textContent=':'+(s<10?'0':'')+s+(h>=12?' PM':' AM');
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cDate').textContent=days[n.getDay()]+', '+n.getDate()+' '+months[n.getMonth()]+' '+n.getFullYear();
  var jan4=new Date(n.getFullYear(),0,4);
  var wk=Math.ceil(((n-jan4)/86400000+jan4.getDay()+1)/7);
  document.getElementById('wk').textContent=wk;
  var start=new Date(n.getFullYear(),0,0);
  var doy=Math.floor((n-start)/86400000);
  document.getElementById('doy').textContent=doy;
  var tz=n.toLocaleTimeString('en',{timeZoneName:'short'}).split(' ').pop();
  document.getElementById('tz').textContent=tz;
  var pct=Math.round((h*3600+m*60+s)/864);
  document.getElementById('dpFill').style.width=pct+'%';
  document.getElementById('dpLabel').textContent='Day '+pct+'% elapsed';
  checkAlarms(h,m,s);
}
setInterval(updateClock,500);updateClock();

var swRun=false,swStart=0,swEl=0,swInt=null,laps=[];
function swToggle(){
  if(!swRun){swStart=Date.now()-swEl;swRun=true;swInt=setInterval(swTick,30);document.getElementById('swBtn').textContent='Pause';document.getElementById('swBtn').className='btn btn-amber-l';document.getElementById('swLap').disabled=false;}
  else{swEl=Date.now()-swStart;swRun=false;clearInterval(swInt);document.getElementById('swBtn').textContent='Resume';document.getElementById('swBtn').className='btn btn-green';}
}
function swTick(){swEl=Date.now()-swStart;renderSW()}
function renderSW(){var t=swEl,ms=t%1000,s=Math.floor(t/1000)%60,m=Math.floor(t/60000);document.getElementById('swT').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;document.getElementById('swMs').textContent='.'+(ms<100?'0':'')+Math.floor(ms/10);}
function swLap(){laps.unshift(swEl);renderLaps();}
function renderLaps(){var ll=document.getElementById('lapList');ll.style.display='block';ll.innerHTML='';laps.forEach(function(t,i){var ms=t%1000,s=Math.floor(t/1000)%60,m=Math.floor(t/60000);var d=document.createElement('div');d.className='lap-row';d.innerHTML='<span>Lap '+(laps.length-i)+'</span><span>'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s+'.'+(ms<100?'0':'')+Math.floor(ms/10)+'</span>';ll.appendChild(d);});}
function swReset(){swRun=false;clearInterval(swInt);swEl=0;laps=[];document.getElementById('swT').textContent='00:00';document.getElementById('swMs').textContent='.000';document.getElementById('swBtn').textContent='Start';document.getElementById('swBtn').className='btn btn-red';document.getElementById('swLap').disabled=true;var ll=document.getElementById('lapList');ll.innerHTML='';ll.style.display='none';}

var tTotal=0,tLeft=0,tRun=false,tInt=null;
function setTimer(mins,btn){tReset();tTotal=mins*60;tLeft=tTotal;document.querySelectorAll('.preset').forEach(function(b){b.classList.remove('sel')});if(btn)btn.classList.add('sel');renderTimer();document.getElementById('cMin').value=mins;document.getElementById('cSec').value='00';}
function onCust(){clearTimeout(window._ct);window._ct=setTimeout(function(){var m=parseInt(document.getElementById('cMin').value)||0,s=parseInt(document.getElementById('cSec').value)||0;tReset();tTotal=m*60+s;tLeft=tTotal;document.querySelectorAll('.preset').forEach(function(b){b.classList.remove('sel')});renderTimer();},500);}
function tToggle(){if(tLeft<=0)return;if(!tRun){tRun=true;tInt=setInterval(tTick,1000);document.getElementById('tBtn').textContent='Pause';document.getElementById('tBtn').className='btn btn-amber-l';document.getElementById('tLbl').textContent='running';}else{tRun=false;clearInterval(tInt);document.getElementById('tBtn').textContent='Resume';document.getElementById('tBtn').className='btn btn-green';document.getElementById('tLbl').textContent='paused';}}
function tTick(){tLeft--;renderTimer();if(tLeft<=0){tRun=false;clearInterval(tInt);document.getElementById('tLbl').textContent='done!';document.getElementById('tBtn').textContent='Start';document.getElementById('tBtn').className='btn btn-red';var snd=document.getElementById('sndSel').value,r=0,si=setInterval(function(){playS(snd);r++;if(r>=3)clearInterval(si);},600);showNotif('Timer complete!');}}
function renderTimer(){var m=Math.floor(tLeft/60),s=tLeft%60;document.getElementById('tDisp').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;var pct=tTotal>0?(tLeft/tTotal):0;document.getElementById('tRing').style.strokeDashoffset=490*(1-pct);if(!document.getElementById('tLbl').textContent.match(/done|paused|running/)){document.getElementById('tLbl').textContent=tTotal>0?Math.floor(tTotal/60)+' min':'—';}}
function tReset(){tRun=false;clearInterval(tInt);tLeft=0;tTotal=0;document.getElementById('tDisp').textContent='00:00';document.getElementById('tRing').style.strokeDashoffset=490;document.getElementById('tBtn').textContent='Start';document.getElementById('tBtn').className='btn btn-red';document.getElementById('tLbl').textContent='set timer';}

var alarms=[];var lastAC='';
function addAlarm(){var t=document.getElementById('alTime').value,l=document.getElementById('alLbl').value||'Alarm';if(!t)return;alarms.push({time:t,label:l,on:true,id:Date.now()});renderAlarms();document.getElementById('alLbl').value='';}
function renderAlarms(){var el=document.getElementById('alList');if(!alarms.length){el.innerHTML='<div class="no-alarms">No alarms set yet.</div>';return;}el.innerHTML='';alarms.forEach(function(a){var d=document.createElement('div');d.className='alarm-card'+(a.on?' on':'')+(a.firing?' firing':'');var p=a.time.split(':'),h=parseInt(p[0]),m=parseInt(p[1]);var disp=(h%12||12)+':'+(m<10?'0':'')+m+(h>=12?' PM':' AM');d.innerHTML='<div><div class="alarm-time">'+disp+'</div><div class="alarm-lbl">'+a.label+'</div></div><div style="display:flex;gap:8px;align-items:center"><button class="tog'+(a.on?' on':'')+'" onclick="togAlarm('+a.id+')">'+(a.on?'ON':'OFF')+'</button><button class="del-btn" onclick="delAlarm('+a.id+')">&#x2715;</button></div>';el.appendChild(d);});}
function togAlarm(id){alarms=alarms.map(function(a){if(a.id===id)a.on=!a.on;return a});renderAlarms();}
function delAlarm(id){alarms=alarms.filter(function(a){return a.id!==id});renderAlarms();}
function checkAlarms(h,m,s){var key=h+':'+m;if(key===lastAC||s>4)return;lastAC=key;var ts=(h<10?'0':'')+h+':'+(m<10?'0':'')+m;alarms.forEach(function(a){if(a.on&&a.time===ts){a.firing=true;renderAlarms();var snd=document.getElementById('sndSel').value,r=0,si=setInterval(function(){playS(snd);r++;if(r>=6){clearInterval(si);a.firing=false;renderAlarms();}},800);showNotif('Alarm: '+a.label);}});}

function setAccent(c1,c2,el){document.documentElement.style.setProperty('--red',c1);document.querySelectorAll('.sw').forEach(function(s){s.classList.remove('active')});el.classList.add('active');}
function applyTheme(t){var themes={light:{bg:'#f7f5f2',white:'#ffffff',surface:'#f0eee9',surface2:'#e8e5df',text:'#1a1814',text2:'#6b6760',border:'#e2dfd9'},warm:{bg:'#fdf8f0',white:'#fffcf7',surface:'#f5efe3',surface2:'#ede4d4',text:'#2a1f0e',text2:'#7a6a52',border:'#e5dace'},cool:{bg:'#f4f6f9',white:'#ffffff',surface:'#edf0f4',surface2:'#e3e7ed',text:'#1a1e28',text2:'#5a6270',border:'#d8dde6'},dark:{bg:'#111117',white:'#1c1c26',surface:'#252532',surface2:'#2e2e3e',text:'#f0f0ff',text2:'#8888aa',border:'#2e2e3e'}};var th=themes[t]||themes.light;Object.entries(th).forEach(function(kv){document.documentElement.style.setProperty('--'+kv[0].replace(/([A-Z])/g,'-$1').toLowerCase(),kv[1]);});}
function setWp(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){document.getElementById('wpLayer').style.backgroundImage='url('+ev.target.result+')';};r.readAsDataURL(f);}
function clearWp(){document.getElementById('wpLayer').style.backgroundImage='none';}
function setWpOp(v){document.getElementById('wpLayer').style.opacity=(v/100);}
function toggleFs(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
function showNotif(msg){var el=document.getElementById('notif');el.textContent=msg;el.style.display='block';clearTimeout(window._nt);window._nt=setTimeout(function(){el.style.display='none';},3500);}
</script>
